AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Cortex - S3 Buckets

Parameters:
  Environment:
    Type: String
  StackPrefix:
    Type: String

Resources:

  PolicyDocumentsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${StackPrefix}-policy-docs-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        EventBridgeConfiguration:
          EventBridgeEnabled: true
      LifecycleConfiguration:
        Rules:
          - Id: BdaOutputToIA
            Status: Enabled
            Prefix: bda-output/
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: trip-cortex
        - Key: ManagedBy
          Value: sam

  NovaActArtifactsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${StackPrefix}-nova-act-artifacts-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireScreenshots
            Status: Enabled
            ExpirationInDays: 90
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: trip-cortex
        - Key: ManagedBy
          Value: sam

  EmbeddingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600  # 14 days
      SqsManagedSseEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: trip-cortex

  EmbeddingQueue:
    Type: AWS::SQS::Queue
    Properties:
      VisibilityTimeout: 1800  # 6x Lambda timeout (300s)
      MessageRetentionPeriod: 345600  # 4 days
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmbeddingDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: trip-cortex

Outputs:
  PolicyDocumentsBucketName:
    Value: !Ref PolicyDocumentsBucket
  PolicyDocumentsBucketArn:
    Value: !GetAtt PolicyDocumentsBucket.Arn
  NovaActArtifactsBucketName:
    Value: !Ref NovaActArtifactsBucket
  NovaActArtifactsBucketArn:
    Value: !GetAtt NovaActArtifactsBucket.Arn
  EmbeddingQueueArn:
    Value: !GetAtt EmbeddingQueue.Arn
  EmbeddingQueueUrl:
    Value: !Ref EmbeddingQueue
  EmbeddingDLQArn:
    Value: !GetAtt EmbeddingDLQ.Arn
