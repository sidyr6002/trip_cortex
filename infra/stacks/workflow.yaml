AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Cortex - Step Functions Workflow

Parameters:
  Environment:
    Type: String
  StackPrefix:
    Type: String
  CheckBdaStatusFunctionArn:
    Type: String
  IngestionCompleteFunctionArn:
    Type: String
  IngestionFailedFunctionArn:
    Type: String

Resources:

  BookingWorkflowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${StackPrefix}-booking-workflow"
      RetentionInDays: 30

  BookingWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${StackPrefix}-booking-workflow"
      Type: STANDARD
      DefinitionUri: ../../statemachine/booking-workflow.asl.json
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt BookingWorkflowLogGroup.Arn
        IncludeExecutionData: false
        Level: ERROR
      Policies:
        - CloudWatchLogsFullAccess
      Tags:
        Environment: !Ref Environment
        Project: trip-cortex
        ManagedBy: sam

  IngestionPollingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${StackPrefix}-ingestion-polling"
      RetentionInDays: 30

  IngestionPollingWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${StackPrefix}-ingestion-polling"
      Type: STANDARD
      DefinitionUri: ../../statemachine/ingestion-polling.asl.json
      DefinitionSubstitutions:
        CheckBdaStatusFunctionArn: !Ref CheckBdaStatusFunctionArn
        IngestionCompleteFunctionArn: !Ref IngestionCompleteFunctionArn
        IngestionFailedFunctionArn: !Ref IngestionFailedFunctionArn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt IngestionPollingLogGroup.Arn
        IncludeExecutionData: false
        Level: ERROR
      Policies:
        - CloudWatchLogsFullAccess
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !Ref CheckBdaStatusFunctionArn
                - !Ref IngestionCompleteFunctionArn
                - !Ref IngestionFailedFunctionArn
      Tags:
        Environment: !Ref Environment
        Project: trip-cortex
        ManagedBy: sam

Outputs:
  BookingWorkflowArn:
    Value: !Ref BookingWorkflow
  IngestionPollingWorkflowArn:
    Value: !Ref IngestionPollingWorkflow
