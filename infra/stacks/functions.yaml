AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Trip Cortex - Lambda Functions & Step Functions Workflows

Parameters:
  Environment:
    Type: String
  BookingsTableArn:
    Type: String
  ConnectionsTableArn:
    Type: String
  AuditLogTableArn:
    Type: String
  CircuitBreakerTableName:
    Type: String
  CircuitBreakerTableArn:
    Type: String
  PolicyDocumentsBucketArn:
    Type: String
  BookingsTableName:
    Type: String
  ConnectionsTableName:
    Type: String
  AuditLogTableName:
    Type: String
  PolicyDocumentsBucketName:
    Type: String
  NovaActArtifactsBucketName:
    Type: String
  AuroraClusterEndpoint:
    Type: String
  AuroraSecretArn:
    Type: String
  AuroraDatabaseName:
    Type: String
  AuroraPort:
    Type: String
  LambdaSecurityGroupId:
    Type: String
  PrivateSubnetIds:
    Type: String
  StackPrefix:
    Type: String
  ClerkSecretKeyArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing the Clerk secret key
  WebSocketManagementEndpoint:
    Type: String
    Default: ""
  EmbeddingQueueArn:
    Type: String
  EmbeddingQueueUrl:
    Type: String
  NovaActSearchAgentArn:
    Type: String
    Description: ACR runtime ARN for trip-cortex-flight-search
  NovaActBookingAgentArn:
    Type: String
    Description: ACR runtime ARN for trip-cortex-flight-booking
  PortalCredentialsSecretArn:
    Type: String
    Description: Secrets Manager secret ARN containing portal email/password
    Default: ""
  DummyPortalUrl:
    Type: String
    Description: URL of the dummy travel portal
    Default: "https://flysmart.dportal.workers.dev"

Conditions:
  IsNotDev: !Not [!Equals [!Ref Environment, dev]]

Globals:
  Function:
    Runtime: python3.12
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 512
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        POWERTOOLS_SERVICE_NAME: trip-cortex
        LOG_LEVEL: INFO
        BOOKINGS_TABLE: !Ref BookingsTableName
        CONNECTIONS_TABLE: !Ref ConnectionsTableName
        AUDIT_LOG_TABLE: !Ref AuditLogTableName
        POLICY_BUCKET: !Ref PolicyDocumentsBucketName
        ARTIFACTS_BUCKET: !Ref NovaActArtifactsBucketName

Resources:

  # ── Step Functions ───────────────────────────────────────────────────────────

  BookingWorkflowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${StackPrefix}-booking-workflow"
      RetentionInDays: 30

  BookingWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${StackPrefix}-booking-workflow"
      Type: STANDARD
      DefinitionUri: ../../statemachine/booking-workflow.asl.json
      DefinitionSubstitutions:
        EmbedAndRetrieveFunctionArn: !GetAtt EmbedAndRetrieveFunction.Arn
        ReasonAndPlanFunctionArn: !GetAtt ReasonAndPlanFunction.Arn
        GracefulDegradationFunctionArn: !GetAtt GracefulDegradationFunction.Arn
        ValidatePlanFunctionArn: !GetAtt ValidatePlanFunction.Arn
        ResponseSenderFunctionArn: !GetAtt ResponseSenderFunction.Arn
        InvokeFlightSearchFunctionArn: !GetAtt InvokeFlightSearchFunction.Arn
        SendFlightOptionsFunctionArn: !GetAtt ResponseSenderFunction.Arn
        InvokeFlightBookingFunctionArn: !GetAtt InvokeFlightBookingFunction.Arn
        CompleteBookingFunctionArn: !GetAtt CompleteBookingFunction.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt BookingWorkflowLogGroup.Arn
        IncludeExecutionData: false
        Level: ERROR
      Policies:
        - CloudWatchLogsFullAccess
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt EmbedAndRetrieveFunction.Arn
                - !GetAtt ReasonAndPlanFunction.Arn
                - !GetAtt GracefulDegradationFunction.Arn
                - !GetAtt ValidatePlanFunction.Arn
                - !GetAtt ResponseSenderFunction.Arn
                - !GetAtt InvokeFlightSearchFunction.Arn
                - !GetAtt InvokeFlightBookingFunction.Arn
                - !GetAtt CompleteBookingFunction.Arn
      Tags:
        Environment: !Ref Environment
        Project: trip-cortex
        ManagedBy: sam

  IngestionPollingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/states/${StackPrefix}-ingestion-polling"
      RetentionInDays: 30

  IngestionPollingWorkflow:
    Type: AWS::Serverless::StateMachine
    Properties:
      Name: !Sub "${StackPrefix}-ingestion-polling"
      Type: STANDARD
      DefinitionUri: ../../statemachine/ingestion-polling.asl.json
      DefinitionSubstitutions:
        CheckBdaStatusFunctionArn: !GetAtt CheckBdaStatusFunction.Arn
        EmbeddingQueueUrl: !Ref EmbeddingQueueUrl
        IngestionCompleteFunctionArn: !GetAtt IngestionCompleteFunction.Arn
        IngestionFailedFunctionArn: !GetAtt IngestionFailedFunction.Arn
      Logging:
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt IngestionPollingLogGroup.Arn
        IncludeExecutionData: false
        Level: ERROR
      Policies:
        - CloudWatchLogsFullAccess
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource:
                - !GetAtt CheckBdaStatusFunction.Arn
                - !GetAtt IngestionCompleteFunction.Arn
                - !GetAtt IngestionFailedFunction.Arn
            - Effect: Allow
              Action: sqs:SendMessage
              Resource: !Ref EmbeddingQueueArn
      Tags:
        Environment: !Ref Environment
        Project: trip-cortex
        ManagedBy: sam

  # ── Lambda Functions ─────────────────────────────────────────────────────────

  WebSocketAuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.ws_authorizer.handler
      Description: WebSocket Lambda authorizer - validates Clerk JWT on $connect
      Environment:
        Variables:
          CLERK_SECRET_ARN: !Ref ClerkSecretKeyArn
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref ClerkSecretKeyArn

  ConnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.connect.handler
      Description: WebSocket $connect handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:GetItem
              Resource: !Ref ConnectionsTableArn

  DisconnectFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.disconnect.handler
      Description: WebSocket $disconnect handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:GetItem
              Resource: !Ref ConnectionsTableArn

  BookingRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.booking_request.handler
      Description: Validates booking request and starts Step Functions execution
      ReservedConcurrentExecutions: !If [IsNotDev, 10, !Ref AWS::NoValue]
      Environment:
        Variables:
          BOOKING_WORKFLOW_ARN: !Ref BookingWorkflow
      Policies:
        - Statement:
            - Effect: Allow
              Action: states:StartExecution
              Resource: !Ref BookingWorkflow
            - Effect: Allow
              Action: states:SendTaskSuccess
              Resource: !Ref BookingWorkflow
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:GetItem
                - dynamodb:Query
              Resource: !Ref BookingsTableArn

  MigrateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.migrate.handler
      Description: Runs Alembic migrations against Aurora — invoke manually after each schema change
      Timeout: 120
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn

  EmbedAndRetrieveFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.embed_and_retrieve.handler
      Description: Generates query embedding and retrieves policy chunks via pgvector
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-2-multimodal-embeddings-v1:0"
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !Ref AuditLogTableArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn

  ReasonAndPlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.reason_plan.handler
      Description: Invokes Nova 2 Lite with Extended Thinking to produce a BookingPlan
      Timeout: 300
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
          NOVA_LITE_MODEL_ID: us.amazon.nova-2-lite-v1:0
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Sid: GrantNovaLiteInferenceProfileAccess
              Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.amazon.nova-2-lite-v1:0"
            - Sid: GrantNovaLiteModelAccess
              Effect: Allow
              Action: bedrock:InvokeModel
              Resource:
                - "arn:aws:bedrock:us-east-1::foundation-model/amazon.nova-2-lite-v1:0"
                - "arn:aws:bedrock:us-east-2::foundation-model/amazon.nova-2-lite-v1:0"
                - "arn:aws:bedrock:us-west-2::foundation-model/amazon.nova-2-lite-v1:0"
              Condition:
                StringEquals:
                  bedrock:InferenceProfileArn: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:inference-profile/us.amazon.nova-2-lite-v1:0"
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !Ref AuditLogTableArn
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn

  ValidatePlanFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.validate_plan.handler
      Description: Validates BookingPlan against policy constraints
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource: !Ref BookingsTableArn

  GracefulDegradationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.graceful_degradation.handler
      Description: Applies strict defaults when reasoning fails — no Bedrock calls
      Timeout: 30
      MemorySize: 128
      Policies:
        - Statement:
            - Effect: Allow
              Action: dynamodb:PutItem
              Resource: !Ref AuditLogTableArn

  ResponseSenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.response_sender.handler
      Description: Sends WebSocket progress updates to connected clients
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Ref WebSocketManagementEndpoint
      Policies:
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
                - dynamodb:Query
              Resource:
                - !Ref BookingsTableArn
                - !Ref ConnectionsTableArn

  InvokeFlightSearchFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.invoke_flight_search.handler
      Description: Invokes ACR flight search workflow
      Timeout: 300
      Environment:
        Variables:
          NOVA_ACT_SEARCH_AGENT_ARN: !Ref NovaActSearchAgentArn
          DUMMY_PORTAL_URL: !Ref DummyPortalUrl
          NOVA_ACT_SEARCH_WORKFLOW: trip-cortex-flight-search
          NOVA_ACT_HEADLESS: "true"
          CIRCUIT_BREAKER_TABLE: !Ref CircuitBreakerTableName
          AUDIT_LOG_TABLE: !Ref AuditLogTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !Ref NovaActSearchAgentArn
                - !Sub "${NovaActSearchAgentArn}/*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
              Resource:
                - !Ref CircuitBreakerTableArn
                - !Ref AuditLogTableArn

  InvokeFlightBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.invoke_flight_booking.handler
      Description: Invokes ACR flight booking workflow
      Timeout: 600
      Environment:
        Variables:
          NOVA_ACT_BOOKING_AGENT_ARN: !Ref NovaActBookingAgentArn
          DUMMY_PORTAL_URL: !Ref DummyPortalUrl
          NOVA_ACT_BOOKING_WORKFLOW: trip-cortex-flight-booking
          NOVA_ACT_HEADLESS: "true"
          PORTAL_TEST_EMAIL: !Sub "{{resolve:secretsmanager:${PortalCredentialsSecretArn}:SecretString:email}}"
          PORTAL_TEST_PASSWORD: !Sub "{{resolve:secretsmanager:${PortalCredentialsSecretArn}:SecretString:password}}"
          CIRCUIT_BREAKER_TABLE: !Ref CircuitBreakerTableName
          AUDIT_LOG_TABLE: !Ref AuditLogTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock-agentcore:InvokeAgentRuntime
              Resource:
                - !Ref NovaActBookingAgentArn
                - !Sub "${NovaActBookingAgentArn}/*"
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref PortalCredentialsSecretArn
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:PutItem
              Resource:
                - !Ref CircuitBreakerTableArn
                - !Ref AuditLogTableArn

  HeartbeatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.heartbeat.handler
      Description: Pings active WebSocket connections to prevent idle disconnects
      Environment:
        Variables:
          WEBSOCKET_ENDPOINT: !Ref WebSocketManagementEndpoint
          BOOKINGS_TABLE: !Ref BookingsTableName
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: true
      Policies:
        - Statement:
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:*/*"
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:DeleteItem
              Resource: !Ref ConnectionsTableArn
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:UpdateItem
              Resource: !Ref BookingsTableArn

  CompleteBookingFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.complete_booking.handler
      Description: Marks booking record COMPLETED or FAILED at workflow end
      Environment:
        Variables:
          BOOKINGS_TABLE: !Ref BookingsTableName
      Policies:
        - Statement:
            - Effect: Allow
              Action: dynamodb:UpdateItem
              Resource: !Ref BookingsTableArn

  BdaSetupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.bda_setup.handler
      Description: One-time BDA project setup — creates BDA project and stores ARN in SSM
      Timeout: 60
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:CreateDataAutomationProject
                - bedrock:ListDataAutomationProjects
              Resource: "*"
            - Effect: Allow
              Action: ssm:PutParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/trip-cortex/*"

  StartIngestionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.start_ingestion.handler
      Description: S3-triggered Lambda that starts BDA ingestion for policy PDFs
      Timeout: 60
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          BDA_PROJECT_ARN: !Sub "{{resolve:ssm:/trip-cortex/${Environment}/bda-project-arn}}"
          BDA_PROFILE_ARN: !Sub "arn:aws:bedrock:${AWS::Region}:${AWS::AccountId}:data-automation-profile/us.data-automation-v1"
          INGESTION_WORKFLOW_ARN: !Ref IngestionPollingWorkflow
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
          POLICY_BUCKET: !Ref PolicyDocumentsBucketName
      Events:
        PolicyUpload:
          Type: EventBridgeRule
          Properties:
            Pattern:
              source:
                - aws.s3
              detail-type:
                - Object Created
              detail:
                bucket:
                  name:
                    - !Ref PolicyDocumentsBucketName
                object:
                  key:
                    - prefix: uploads/
                    - suffix: .pdf
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeDataAutomationAsync
              Resource: "*"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:ListBucket
              Resource:
                - !Sub "${PolicyDocumentsBucketArn}/*"
                - !Ref PolicyDocumentsBucketArn
            - Effect: Allow
              Action: states:StartExecution
              Resource: !Ref IngestionPollingWorkflow
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn

  CheckBdaStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.check_bda_status.handler
      Description: Polls BDA job status — invoked by ingestion polling Step Functions
      Timeout: 30
      Policies:
        - Statement:
            - Effect: Allow
              Action: bedrock:GetDataAutomationStatus
              Resource: "*"

  GenerateEmbeddingsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.generate_embeddings.handler
      Description: Generates Nova MME embeddings from BDA output and stores in pgvector
      Timeout: 300
      MemorySize: 1024
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
          NOVA_EMBEDDINGS_MODEL_ID: amazon.nova-2-multimodal-embeddings-v1:0
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: bedrock:InvokeModel
              Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-2-multimodal-embeddings-v1:0"
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !Ref PolicyDocumentsBucketArn
                - !Sub "${PolicyDocumentsBucketArn}/*"
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
              Resource: !Ref EmbeddingQueueArn
      Events:
        EmbeddingQueue:
          Type: SQS
          Properties:
            Queue: !Ref EmbeddingQueueArn
            BatchSize: 1
            Enabled: true

  IngestionCompleteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.ingestion_complete.handler
      Description: Marks policy ingestion as complete in Aurora
      Timeout: 30
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn

  IngestionFailedFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../../src/
      Handler: handlers.ingestion_failed.handler
      Description: Marks policy ingestion as failed in Aurora
      Timeout: 30
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Split [",", !Ref PrivateSubnetIds]
      Environment:
        Variables:
          AURORA_HOST: !Ref AuroraClusterEndpoint
          AURORA_PORT: !Ref AuroraPort
          AURORA_DATABASE: !Ref AuroraDatabaseName
          AURORA_SECRET_ARN: !Ref AuroraSecretArn
      Policies:
        - AWSLambdaVPCAccessExecutionRole
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref AuroraSecretArn

Outputs:
  BookingWorkflowArn:
    Value: !Ref BookingWorkflow
  IngestionPollingWorkflowArn:
    Value: !Ref IngestionPollingWorkflow
  WebSocketAuthorizerFunctionArn:
    Value: !GetAtt WebSocketAuthorizerFunction.Arn
  MigrateFunctionArn:
    Value: !GetAtt MigrateFunction.Arn
  ConnectFunctionArn:
    Value: !GetAtt ConnectFunction.Arn
  DisconnectFunctionArn:
    Value: !GetAtt DisconnectFunction.Arn
  BookingRequestFunctionArn:
    Value: !GetAtt BookingRequestFunction.Arn
  EmbedAndRetrieveFunctionArn:
    Value: !GetAtt EmbedAndRetrieveFunction.Arn
  ReasonAndPlanFunctionArn:
    Value: !GetAtt ReasonAndPlanFunction.Arn
  ValidatePlanFunctionArn:
    Value: !GetAtt ValidatePlanFunction.Arn
  GracefulDegradationFunctionArn:
    Value: !GetAtt GracefulDegradationFunction.Arn
  ResponseSenderFunctionArn:
    Value: !GetAtt ResponseSenderFunction.Arn
  HeartbeatFunctionArn:
    Value: !GetAtt HeartbeatFunction.Arn
  BdaSetupFunctionArn:
    Value: !GetAtt BdaSetupFunction.Arn
  CheckBdaStatusFunctionArn:
    Value: !GetAtt CheckBdaStatusFunction.Arn
  GenerateEmbeddingsFunctionArn:
    Value: !GetAtt GenerateEmbeddingsFunction.Arn
  IngestionCompleteFunctionArn:
    Value: !GetAtt IngestionCompleteFunction.Arn
  IngestionFailedFunctionArn:
    Value: !GetAtt IngestionFailedFunction.Arn
  InvokeFlightSearchFunctionArn:
    Value: !GetAtt InvokeFlightSearchFunction.Arn
  InvokeFlightBookingFunctionArn:
    Value: !GetAtt InvokeFlightBookingFunction.Arn
  CompleteBookingFunctionArn:
    Value: !GetAtt CompleteBookingFunction.Arn
